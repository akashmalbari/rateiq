<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Figure My Money favicon symbol centered">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#050d1a"/>
      <stop offset="100%" stop-color="#0a1f3f"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0%" stop-color="#62c8ff"/>
      <stop offset="100%" stop-color="#9be3ff"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="12" fill="none" stroke="#1e4d7f" stroke-opacity="0.55"/>

  <!-- centered candlestick cluster -->
  <rect x="21" y="34" width="5" height="12" rx="1.6" fill="#58b7ff"/>
  <rect x="29.5" y="28" width="5" height="18" rx="1.6" fill="#7fd1ff"/>
  <rect x="38" y="22" width="5" height="24" rx="1.6" fill="#a8e6ff"/>

  <!-- centered breakout arrow -->
  <path d="M19 41l9-9 5 5 12-14" fill="none" stroke="url(#line)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M45 23v8h-8" fill="none" stroke="#9be3ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- subtle base line for balance -->
  <line x1="16" y1="48" x2="48" y2="48" stroke="#2b578a" stroke-opacity="0.7" stroke-width="1.5"/>
</svg>
